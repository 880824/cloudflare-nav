<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网站导航 - 样式预览</title>

    <link rel="dns-prefetch" href="https://favicon.im">
    <link rel="preconnect" href="https://favicon.im" crossorigin>
    <link rel="dns-prefetch" href="https://icons.duckduckgo.com">
    <link rel="preconnect" href="https://icons.duckduckgo.com" crossorigin>

    <link rel="preload" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" as="style">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="toast">操作成功</div>

    <div id="global-loading-overlay" class="modal" style="z-index: 9999;">
        <div class="global-spinner"></div>
        <div id="global-loading-text" style="color: #fff; font-size: 15px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">正在处理中...</div>
    </div>

    <div class="container">
        <div id="skeleton-screen">
            <div class="skel-tabs">
                <div class="skel-tab skel-anim"></div>
                <div class="skel-tab skel-anim"></div>
                <div class="skel-tab skel-anim"></div>
            </div>
            <div class="skel-grid">
                <div class="skel-card skel-anim"></div>
                <div class="skel-card skel-anim"></div>
                <div class="skel-card skel-anim"></div>
                <div class="skel-card skel-anim"></div>
                <div class="skel-card skel-anim"></div>
                <div class="skel-card skel-anim"></div>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div id="layout-wrapper">
                <div class="tab-container">
                    <div id="tabs" class="tabs"></div>
                    <div id="cat-manage-area"></div>
                </div>
                <div id="grid-container"></div>
            </div>
        </div>
    </div>

    <div id="footer-cache" class="footer-info"></div>

    <!-- 右上角固定面板（样式切换 + 管理员工具） -->
    <div class="fab">
        <div id="style-switcher" class="style-switcher-panel">
            <div class="style-switcher-label">样式</div>
            <button class="style-btn" id="style-btn-0" data-style="0" title="经典图标样式">
                <i class="ri-grid-fill"></i>
                <span>默认</span>
            </button>
            <button class="style-btn" id="style-btn-2" data-style="2" title="缤纷模式（自定义网格背景色）">
                <i class="ri-palette-fill"></i>
                <span>缤纷</span>
            </button>
        </div>
        <div id="admin-tools" style="display:contents"></div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none">

    <div id="auth-overlay" class="modal">
        <div class="modal-content" style="text-align:center">
            <button id="btn-close-auth" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#777; cursor:pointer; font-size:24px">×</button>
            <h3>管理验证</h3>
            <input type="password" id="auth-input" placeholder="请输入Token" autocomplete="new-password" style="text-align:center; margin: 20px 0">
            <button id="btn-login" class="tab-btn active" style="width:100%">进入后台</button>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <button id="btn-close-edit" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#777; cursor:pointer; font-size:24px">×</button>
            <h4 id="edit-title" style="margin-bottom:20px; font-size:16px">编辑详情</h4>
            <div id="edit-form-body"></div>
            <button id="btn-confirm-edit" class="tab-btn active" style="width:100%; margin-top:10px">确认保存修改</button>
        </div>
    </div>

    <!-- 本地预览：模拟 API 数据，跳过真实网络请求 -->
    <script>
    // 模拟 appData（预览用）
    const MOCK_DATA = {
        isAdmin: false,
        bgUrl: null,
        settings: { cardWidth: 85 },
        lastUpdated: '2026/4/6 22:30',
        categories: [
            { id: 'A01', name: '搜索引擎', icon: '🔍', hidden: false },
            { id: 'B01', name: '开发工具', icon: '🛠️', hidden: false },
            { id: 'C01', name: '设计资源', icon: '🎨', hidden: false }
        ],
        items: [
            { id: 'A001', catId: 'A01', title: 'Google', url: 'https://www.google.com', icon: 'https://favicon.im/google.com', desc: '全球最大搜索引擎', bgColor: 'rgba(66,133,244,0.4)' },
            { id: 'A002', catId: 'A01', title: 'Bing', url: 'https://www.bing.com', icon: 'https://favicon.im/bing.com', desc: '微软必应搜索', bgColor: 'rgba(0,120,212,0.4)' },
            { id: 'A003', catId: 'A01', title: 'DuckDuckGo', url: 'https://duckduckgo.com', icon: 'https://favicon.im/duckduckgo.com', desc: '注重隐私的搜索引擎', bgColor: 'rgba(229,118,22,0.4)' },
            { id: 'A004', catId: 'A01', title: 'Baidu', url: 'https://www.baidu.com', icon: 'https://favicon.im/baidu.com', desc: '百度搜索', bgColor: 'rgba(255,102,0,0.4)' },
            { id: 'A005', catId: 'A01', title: 'Perplexity', url: 'https://www.perplexity.ai', icon: 'https://favicon.im/perplexity.ai', desc: 'AI 驱动搜索引擎', bgColor: 'rgba(139,92,246,0.4)' },
            { id: 'A006', catId: 'A01', title: '搜狗', url: 'https://www.sogou.com', icon: 'https://favicon.im/sogou.com', desc: '搜狗搜索', bgColor: 'rgba(255,102,0,0.4)' },
            { id: 'B001', catId: 'B01', title: 'GitHub', url: 'https://github.com', icon: 'https://favicon.im/github.com', desc: '全球最大代码托管平台', bgColor: 'rgba(36,41,46,0.55)' },
            { id: 'B002', catId: 'B01', title: 'VS Code', url: 'https://code.visualstudio.com', icon: 'https://favicon.im/code.visualstudio.com', desc: '微软开源代码编辑器', bgColor: 'rgba(0,122,204,0.4)' },
            { id: 'B003', catId: 'B01', title: 'MDN', url: 'https://developer.mozilla.org', icon: 'https://favicon.im/developer.mozilla.org', desc: 'Web 开发文档', bgColor: 'rgba(35,3,79,0.55)' },
            { id: 'B004', catId: 'B01', title: 'Stack Overflow', url: 'https://stackoverflow.com', icon: 'https://favicon.im/stackoverflow.com', desc: '开发者问答社区', bgColor: 'rgba(244,128,36,0.4)' },
            { id: 'B005', catId: 'B01', title: 'npm', url: 'https://www.npmjs.com', icon: 'https://favicon.im/npmjs.com', desc: 'Node.js 包管理器', bgColor: 'rgba(203,31,31,0.4)' },
            { id: 'B006', catId: 'B01', title: 'Cloudflare', url: 'https://www.cloudflare.com', icon: 'https://favicon.im/cloudflare.com', desc: 'CDN 与安全服务', bgColor: 'rgba(245,156,26,0.4)' },
            { id: 'C001', catId: 'C01', title: 'Figma', url: 'https://www.figma.com', icon: 'https://favicon.im/figma.com', desc: '协作设计工具', bgColor: 'rgba(10,207,131,0.4)' },
            { id: 'C002', catId: 'C01', title: 'Dribbble', url: 'https://dribbble.com', icon: 'https://favicon.im/dribbble.com', desc: '设计师作品展示平台', bgColor: 'rgba(233,85,142,0.4)' },
            { id: 'C003', catId: 'C01', title: 'Unsplash', url: 'https://unsplash.com', icon: 'https://favicon.im/unsplash.com', desc: '免费高清图片库', bgColor: 'rgba(0,0,0,0.45)' },
            { id: 'C004', catId: 'C01', title: 'Coolors', url: 'https://coolors.co', icon: 'https://favicon.im/coolors.co', desc: '配色方案生成器', bgColor: 'rgba(255,70,75,0.4)' }
        ]
    };

    // 覆盖 fetch，在预览模式下返回模拟数据
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('/api/config')) {
            return Promise.resolve({
                ok: true,
                status: 200,
                json: () => Promise.resolve(MOCK_DATA)
            });
        }
        return originalFetch.apply(this, arguments);
    };

    // 覆盖 Service Worker 注册（预览模式下不需要）
    if (navigator.serviceWorker) {
        navigator.serviceWorker.register = () => Promise.resolve();
    }
    </script>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
